name: blackpearl

networks:
  traefik-private:
    external: true

services:

  vpn:
    image: qmcgaw/gluetun:latest
    container_name: blackpearl-vpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    networks:
      - traefik-private
    environment:
      TZ: ${TZ}
      VPN_SERVICE_PROVIDER: nordvpn
      VPN_TYPE: openvpn
      OPENVPN_USER: ${VPN_USER}
      OPENVPN_PASSWORD: ${VPN_PASSWORD}
      SERVER_COUNTRIES: ${VPN_SERVER_COUNTRIES}
      # DNS server used inside the tunnel — NordVPN's DNS resolver
      DNS_ADDRESS: ${VPN_DNS}
      # Disable DNS over TLS — use plain DNS through the tunnel instead.
      # DoT requires an extra bootstrap resolution step that can fail on
      # restricted networks before the tunnel is fully established.
      DOT: "off"
      # Disable gluetun's built-in DNS blocklists — they block legitimate
      # Usenet providers under the "malicious" category.
      BLOCK_MALICIOUS: "off"
      # Allow direct (non-VPN) access to local LAN subnets — needed for
      # services like Radarr/Sonarr/Seerr to reach Plex on the local network.
      # All other outbound traffic is still forced through the VPN tunnel.
      FIREWALL_OUTBOUND_SUBNETS: ${LAN_SUBNETS}
    volumes:
      - /mnt/.ix-apps/app_configs/blackpearl/gluetun:/gluetun
    devices:
      - /dev/net/tun
    # Healthcheck confirms the tun0 interface is up before app containers
    # are allowed to attach to this container's network namespace.
    healthcheck:
      test: ["CMD-SHELL", "ip link show tun0 > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    labels:
      - traefik.enable=true

      # Radarr
      - traefik.http.routers.radarr-private-web.rule=Host(`${RADARR_HOST}`)
      - traefik.http.routers.radarr-private-web.entrypoints=web-private
      - traefik.http.routers.radarr-private-web.middlewares=redirect-to-https-private@docker
      - traefik.http.routers.radarr-private-web.service=radarr
      - traefik.http.routers.radarr-private.rule=Host(`${RADARR_HOST}`)
      - traefik.http.routers.radarr-private.entrypoints=websecure-private
      - traefik.http.routers.radarr-private.tls.certresolver=mydnschallenge
      - traefik.http.routers.radarr-private.service=radarr
      - traefik.http.services.radarr.loadbalancer.server.port=7878

      # Sonarr
      - traefik.http.routers.sonarr-private-web.rule=Host(`${SONARR_HOST}`)
      - traefik.http.routers.sonarr-private-web.entrypoints=web-private
      - traefik.http.routers.sonarr-private-web.middlewares=redirect-to-https-private@docker
      - traefik.http.routers.sonarr-private-web.service=sonarr
      - traefik.http.routers.sonarr-private.rule=Host(`${SONARR_HOST}`)
      - traefik.http.routers.sonarr-private.entrypoints=websecure-private
      - traefik.http.routers.sonarr-private.tls.certresolver=mydnschallenge
      - traefik.http.routers.sonarr-private.service=sonarr
      - traefik.http.services.sonarr.loadbalancer.server.port=8989

      # Lidarr (commented out — re-enable when lidarr service is re-enabled)
      # - traefik.http.routers.lidarr-private-web.rule=Host(`${LIDARR_HOST}`)
      # - traefik.http.routers.lidarr-private-web.entrypoints=web-private
      # - traefik.http.routers.lidarr-private-web.middlewares=redirect-to-https-private@docker
      # - traefik.http.routers.lidarr-private-web.service=lidarr
      # - traefik.http.routers.lidarr-private.rule=Host(`${LIDARR_HOST}`)
      # - traefik.http.routers.lidarr-private.entrypoints=websecure-private
      # - traefik.http.routers.lidarr-private.tls.certresolver=mydnschallenge
      # - traefik.http.routers.lidarr-private.service=lidarr
      # - traefik.http.services.lidarr.loadbalancer.server.port=8686

      # Readarr
      - traefik.http.routers.readarr-private-web.rule=Host(`${READARR_HOST}`)
      - traefik.http.routers.readarr-private-web.entrypoints=web-private
      - traefik.http.routers.readarr-private-web.middlewares=redirect-to-https-private@docker
      - traefik.http.routers.readarr-private-web.service=readarr
      - traefik.http.routers.readarr-private.rule=Host(`${READARR_HOST}`)
      - traefik.http.routers.readarr-private.entrypoints=websecure-private
      - traefik.http.routers.readarr-private.tls.certresolver=mydnschallenge
      - traefik.http.routers.readarr-private.service=readarr
      - traefik.http.services.readarr.loadbalancer.server.port=8787

      # NZBGet
      - traefik.http.routers.nzbget-private-web.rule=Host(`${NZBGET_HOST}`)
      - traefik.http.routers.nzbget-private-web.entrypoints=web-private
      - traefik.http.routers.nzbget-private-web.middlewares=redirect-to-https-private@docker
      - traefik.http.routers.nzbget-private-web.service=nzbget
      - traefik.http.routers.nzbget-private.rule=Host(`${NZBGET_HOST}`)
      - traefik.http.routers.nzbget-private.entrypoints=websecure-private
      - traefik.http.routers.nzbget-private.tls.certresolver=mydnschallenge
      - traefik.http.routers.nzbget-private.service=nzbget
      - traefik.http.services.nzbget.loadbalancer.server.port=6789

      # qBittorrent
      - traefik.http.routers.qbittorrent-private-web.rule=Host(`${QBITTORRENT_HOST}`)
      - traefik.http.routers.qbittorrent-private-web.entrypoints=web-private
      - traefik.http.routers.qbittorrent-private-web.middlewares=redirect-to-https-private@docker
      - traefik.http.routers.qbittorrent-private-web.service=qbittorrent
      - traefik.http.routers.qbittorrent-private.rule=Host(`${QBITTORRENT_HOST}`)
      - traefik.http.routers.qbittorrent-private.entrypoints=websecure-private
      - traefik.http.routers.qbittorrent-private.tls.certresolver=mydnschallenge
      - traefik.http.routers.qbittorrent-private.service=qbittorrent
      - traefik.http.services.qbittorrent.loadbalancer.server.port=8080

      # Prowlarr
      - traefik.http.routers.prowlarr-private-web.rule=Host(`${PROWLARR_HOST}`)
      - traefik.http.routers.prowlarr-private-web.entrypoints=web-private
      - traefik.http.routers.prowlarr-private-web.middlewares=redirect-to-https-private@docker
      - traefik.http.routers.prowlarr-private-web.service=prowlarr
      - traefik.http.routers.prowlarr-private.rule=Host(`${PROWLARR_HOST}`)
      - traefik.http.routers.prowlarr-private.entrypoints=websecure-private
      - traefik.http.routers.prowlarr-private.tls.certresolver=mydnschallenge
      - traefik.http.routers.prowlarr-private.service=prowlarr
      - traefik.http.services.prowlarr.loadbalancer.server.port=9696

      # Overseerr
      - traefik.http.routers.overseerr-private-web.rule=Host(`${OVERSEERR_HOST}`)
      - traefik.http.routers.overseerr-private-web.entrypoints=web-private
      - traefik.http.routers.overseerr-private-web.middlewares=redirect-to-https-private@docker
      - traefik.http.routers.overseerr-private-web.service=overseerr
      - traefik.http.routers.overseerr-private.rule=Host(`${OVERSEERR_HOST}`)
      - traefik.http.routers.overseerr-private.entrypoints=websecure-private
      - traefik.http.routers.overseerr-private.tls.certresolver=mydnschallenge
      - traefik.http.routers.overseerr-private.service=overseerr
      - traefik.http.services.overseerr.loadbalancer.server.port=5055

  radarr:
    image: ghcr.io/hotio/radarr
    container_name: blackpearl-radarr
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      vpn:
        condition: service_healthy
    environment:
      TZ: ${TZ}
    volumes:
      - ${RADARR_CONFIG_PATH}:/config
      - ${MEDIA_PATH}:/media

  sonarr:
    image: ghcr.io/hotio/sonarr:latest
    container_name: blackpearl-sonarr
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      vpn:
        condition: service_healthy
    environment:
      TZ: ${TZ}
    volumes:
      - ${SONARR_CONFIG_PATH}:/config
      - ${MEDIA_PATH}:/media

  # lidarr:
  #   # hotio/lidarr was removed from Docker Hub; re-enable using ghcr.io/hotio/lidarr
  #   # when ready to add music library management.
  #   image: ghcr.io/hotio/lidarr
  #   container_name: blackpearl-lidarr
  #   restart: unless-stopped
  #   network_mode: service:vpn
  #   depends_on:
  #     - vpn
  #   environment:
  #     TZ: ${TZ}
  #   volumes:
  #     - ${LIDARR_CONFIG_PATH}:/config
  #     - ${MEDIA_PATH}:/media

  readarr:
    image: lscr.io/linuxserver/readarr:0.4.19-nightly
    container_name: blackpearl-readarr
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      vpn:
        condition: service_healthy
    environment:
      TZ: ${TZ}
    volumes:
      - ${READARR_CONFIG_PATH}:/config
      - ${MEDIA_PATH}:/media

  nzbget:
    image: ghcr.io/hotio/nzbget
    container_name: blackpearl-nzbget
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      vpn:
        condition: service_healthy
    environment:
      TZ: ${TZ}
    volumes:
      - ${NZBGET_CONFIG_PATH}:/config
      - ${MEDIA_PATH}:/media

  overseerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: blackpearl-overseerr
    restart: unless-stopped
    init: true
    network_mode: service:vpn
    depends_on:
      vpn:
        condition: service_healthy
    environment:
      TZ: ${TZ}
    volumes:
      - ${OVERSEERR_CONFIG_PATH}:/app/config
      - ${MEDIA_PATH}:/media

  qbittorrent:
    image: ghcr.io/hotio/qbittorrent
    container_name: blackpearl-qbittorrent
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      vpn:
        condition: service_healthy
    environment:
      TZ: ${TZ}
    volumes:
      - ${QBITTORRENT_CONFIG_PATH}:/config
      - ${MEDIA_PATH}:/media

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: blackpearl-flaresolverr
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      vpn:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      LOG_LEVEL: info

  prowlarr:
    image: ghcr.io/hotio/prowlarr
    container_name: blackpearl-prowlarr
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      vpn:
        condition: service_healthy
    environment:
      TZ: ${TZ}
    volumes:
      - ${PROWLARR_CONFIG_PATH}:/config

  # speedtest:
  #   # The speedtest container exposes a Prometheus metrics endpoint at :9516/probe
  #   # that measures VPN tunnel throughput. It can be re-enabled in the future once
  #   # Grafana Alloy is deployed and configured to scrape it, allowing historical
  #   # VPN performance to be recorded and visualised over time.
  #   image: jraviles/prometheus_speedtest:latest
