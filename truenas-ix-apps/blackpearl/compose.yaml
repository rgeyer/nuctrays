name: blackpearl

networks:
  traefik-private:
    external: true

volumes:
  media:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=${MEDIA_NFS_SERVER},rw,nfsvers=4"
      device: ":${MEDIA_NFS_PATH}"

services:

  vpn:
    image: dperson/openvpn-client
    container_name: blackpearl-vpn
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    privileged: true
    networks:
      - traefik-private
    environment:
      TZ: ${TZ}
      FIREWALL: "1"
    volumes:
      - ./vpn/client.ovpn:/vpn/client.ovpn:ro
      - ./vpn/auth.txt:/vpn/auth.txt:ro
    devices:
      - /dev/net/tun
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 8.8.4.4
    labels:
      - traefik.enable=true

      # Radarr
      - traefik.http.routers.radarr-private.rule=Host(`${RADARR_HOST}`)
      - traefik.http.routers.radarr-private.entrypoints=websecure-private
      - traefik.http.routers.radarr-private.tls.certresolver=mydnschallenge
      - traefik.http.routers.radarr-private.service=radarr
      - traefik.http.services.radarr.loadbalancer.server.port=7878

      # Sonarr
      - traefik.http.routers.sonarr-private.rule=Host(`${SONARR_HOST}`)
      - traefik.http.routers.sonarr-private.entrypoints=websecure-private
      - traefik.http.routers.sonarr-private.tls.certresolver=mydnschallenge
      - traefik.http.routers.sonarr-private.service=sonarr
      - traefik.http.services.sonarr.loadbalancer.server.port=8989

      # Lidarr
      - traefik.http.routers.lidarr-private.rule=Host(`${LIDARR_HOST}`)
      - traefik.http.routers.lidarr-private.entrypoints=websecure-private
      - traefik.http.routers.lidarr-private.tls.certresolver=mydnschallenge
      - traefik.http.routers.lidarr-private.service=lidarr
      - traefik.http.services.lidarr.loadbalancer.server.port=8686

      # Readarr
      - traefik.http.routers.readarr-private.rule=Host(`${READARR_HOST}`)
      - traefik.http.routers.readarr-private.entrypoints=websecure-private
      - traefik.http.routers.readarr-private.tls.certresolver=mydnschallenge
      - traefik.http.routers.readarr-private.service=readarr
      - traefik.http.services.readarr.loadbalancer.server.port=8787

      # NZBGet
      - traefik.http.routers.nzbget-private.rule=Host(`${NZBGET_HOST}`)
      - traefik.http.routers.nzbget-private.entrypoints=websecure-private
      - traefik.http.routers.nzbget-private.tls.certresolver=mydnschallenge
      - traefik.http.routers.nzbget-private.service=nzbget
      - traefik.http.services.nzbget.loadbalancer.server.port=6789

      # Overseerr
      - traefik.http.routers.overseerr-private.rule=Host(`${OVERSEERR_HOST}`)
      - traefik.http.routers.overseerr-private.entrypoints=websecure-private
      - traefik.http.routers.overseerr-private.tls.certresolver=mydnschallenge
      - traefik.http.routers.overseerr-private.service=overseerr
      - traefik.http.services.overseerr.loadbalancer.server.port=5055

  radarr:
    image: hotio/radarr
    container_name: blackpearl-radarr
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      - vpn
    environment:
      TZ: ${TZ}
    volumes:
      - ${RADARR_CONFIG_PATH}:/config
      - media:/media

  sonarr:
    image: hotio/sonarr:phantom
    container_name: blackpearl-sonarr
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      - vpn
    environment:
      TZ: ${TZ}
    volumes:
      - ${SONARR_CONFIG_PATH}:/config
      - media:/media

  lidarr:
    image: hotio/lidarr
    container_name: blackpearl-lidarr
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      - vpn
    environment:
      TZ: ${TZ}
    volumes:
      - ${LIDARR_CONFIG_PATH}:/config
      - media:/media

  readarr:
    image: hotio/readarr:nightly-0.1.0.619
    container_name: blackpearl-readarr
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      - vpn
    environment:
      TZ: ${TZ}
    volumes:
      - ${READARR_CONFIG_PATH}:/config
      - media:/media

  nzbget:
    image: hotio/nzbget
    container_name: blackpearl-nzbget
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      - vpn
    environment:
      TZ: ${TZ}
    volumes:
      - ${NZBGET_CONFIG_PATH}:/config
      - media:/media

  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: blackpearl-overseerr
    restart: unless-stopped
    network_mode: service:vpn
    depends_on:
      - vpn
    environment:
      TZ: ${TZ}
    volumes:
      - ${OVERSEERR_CONFIG_PATH}:/config
      - media:/media

  # speedtest:
  #   # The speedtest container exposes a Prometheus metrics endpoint at :9516/probe
  #   # that measures VPN tunnel throughput. It can be re-enabled in the future once
  #   # Grafana Alloy is deployed and configured to scrape it, allowing historical
  #   # VPN performance to be recorded and visualised over time.
